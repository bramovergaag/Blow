name: BLOW Archive Publisher

on:
  schedule:
    - cron: '0 17 * * *'  # 19:00 Europe/Amsterdam (zomertijd) / 18:00 (wintertijd)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run publisher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: node scripts/blow-publisher.mjs
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pilot/posts/
          git diff --cached --quiet || git commit -m "BLOW publisher: $(date -u +%Y-%m-%d)"
          git push
