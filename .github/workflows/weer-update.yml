name: BLOW — weer update (06:30 NL)

on:
  schedule:
    # Twee cron-entries voor DST. Het script doet zelf idempotentie-check
    # (skip als weer.json al vandaag is opgehaald) zodat beide fires OK zijn,
    # ook met de grote GitHub Actions cron-vertraging.
    - cron: "30 4 * * *"   # 06:30 NL (CEST, zomer)
    - cron: "30 5 * * *"   # 06:30 NL (CET, winter)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blow-weer-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run weer-update
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/weer-update.mjs

      - name: Commit & push
        run: |
          git config user.name  "bram overgaag"
          git config user.email "bramovergaag@gmail.com"
          if git diff --quiet -- data/weer.json; then
            echo "Geen wijzigingen in weer.json."
          else
            git add data/weer.json
            git commit -m "weer update $(TZ=Europe/Amsterdam date +%Y-%m-%d)"
            git push origin main
          fi
