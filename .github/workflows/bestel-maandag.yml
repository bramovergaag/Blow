name: BLOW — bestel maandag (08:00 NL)

on:
  schedule:
    # Twee cron-entries voor DST; `* * 1` beperkt tot Maandag UTC (= Maandag NL).
    # Script doet idempotentie-check zodat beide fires OK zijn, ook bij
    # de grote GitHub Actions cron-vertraging.
    - cron: "0 6 * * 1"   # 08:00 NL (CEST, zomer)
    - cron: "0 7 * * 1"   # 08:00 NL (CET, winter)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blow-bestel-maandag
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run bestel maandag
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: node scripts/bestel.mjs maandag

      - name: Commit & push
        run: |
          git config user.name  "bram overgaag"
          git config user.email "bramovergaag@gmail.com"
          if git diff --quiet -- data/voorspelling.json; then
            echo "Geen wijzigingen in voorspelling.json."
          else
            git add data/voorspelling.json
            git commit -m "voorspelling maandag $(TZ=Europe/Amsterdam date -d '+3 days' +%Y-%m-%d)"
            git push origin main
          fi
